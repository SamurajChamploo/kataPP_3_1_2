server.port=8088

spring.datasource.url=jdbc:postgresql://localhost:5432/security_db
spring.datasource.username=postgres
spring.datasource.password=postgresql
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:migration/0
spring.flyway.baseline-on-migrate=true

spring.thymeleaf.cache=false

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.springframework.boot.web.servlet.support.ErrorPageFilter=DEBUG
logging.level.org.hibernate=INFO
logging.level.ru.kata.spring.boot_security.demo=DEBUG
logging.level.org.springframework.dao=DEBUG
logging.level.org.springframework.transaction=DEBUG